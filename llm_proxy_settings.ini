; ============================================================
; InstantaleLlmProxy 設定ファイル (GUIの操作で自動生成・更新)
; key=value 形式。手動編集も可。保存すると次のLLMリクエストから反映(一部は要ゲーム再起動)
; ・schema_compact: プロンプトに埋め込まれたJSONスキーマ説明を圧縮するか (1/0)
; ・log_replace / log_compact / log_dedup / log_jsonfix / log_rules / log_openai:
;   llm_proxy.log に出す動作ログの項目別ON/OFF (1/0・既定1)
; ・log_diag: [DIAG]診断行を出すか (1/0・調査用・既定0)
; ・dump_schema / dump_prompt / dump_resp: 各ダンプ(llm_proxy_*_dump.log)を出すか
;   (1/0・調査用・既定0・ログが非常に大きくなる)
; ・openai_wrapper: ゲームがローカルLLM設定のとき、同梱llama-serverの代わりに接続先の
;   OpenAI互換サーバへ翻訳中継するか (1/0・既定0=ローカルLLM。要ゲーム再起動)
; ・openai_endpoint / openai_model / openai_api_key: 任意OpenAI互換サーバへ中継する接続設定
;   (保存されているだけでは動作は変わらない。openai_wrapper か 中継サーバ起動で使われる)
; ・openai_listen_port: ゲーム側のOpenAI互換設定から使う中継サーバの待ち受けポート
;   (GUIメニューの「中継サーバを起動」で待ち受け開始。空なら中継サーバ無効)
; ・openai_json_mode: object(既定)|schema|off (ラッパー翻訳時のみ)
; ============================================================
[Settings]
schema_compact=1
log_replace=1
log_compact=1
log_dedup=1
log_jsonfix=1
log_rules=1
log_openai=1
log_diag=0
dump_schema=0
dump_prompt=0
dump_resp=0
openai_wrapper=0
openai_endpoint=
openai_model=
openai_api_key=
openai_listen_port=8181
openai_json_mode=object
openai_temperature=
openai_max_tokens=
